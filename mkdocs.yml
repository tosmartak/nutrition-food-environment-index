site_name: N-FEI Python
site_description: Nutrition-Sensitive Food Environment Index utilities for Python
site_url: https://tosmartak.github.io/nfei/
repo_url: https://github.com/tosmartak/nutrition-food-environment-index
repo_name: nutrition-food-environment-index

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["src"]
          options:
            docstring_style: numpy
            show_source: false
            show_root_heading: true
            show_root_full_path: true
            show_signature_annotations: true
            separate_signature: true
            members_order: source
  - mkdocs-jupyter

nav:
  - Home: index.md
  - Methodology: methodology.md
  - Getting started: getting-started.md
  - Examples:
      - End-to-end NFEI workflow: examples/nfei_end_to_end_example.ipynb
  - API reference:
      - Availability: api/availability.md
      - ProColor: api/color.md
      - Diversity: api/diversity.md
      - Density: api/density.md
      - Spatial: api/spatial.md
      - Scaling: api/scaling.md
      - Validation: api/validation.md